<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You, My Love ♡</title>

    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&family=Indie+Flower&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Soft Background Music -->
    <audio autoplay loop>
        <source src="bg_music.mp3" type="audio/mpeg">
    </audio>

    <!-- Intro Heartbeat Animation -->
    <div class="intro">
        <h1 class="her-name">For You, My Special Person ♡</h1>
        <p class="intro-line">A tiny soft corner of the world I made just for you…</p>
    </div>

    <!-- Sparkles -->
    <div class="sparkles"></div>

    <!-- Recordings Section -->
    <p class="subtitle">Whenever your heart feels something… choose the voice made for you.</p>

    <div class="recording">
        <h2>When You Miss Me</h2>
        <audio controls>
            <source src="miss_you.mp3">
        </audio>
    </div>

    <div class="recording">
        <h2>When You Feel Sad</h2>
        <audio controls>
            <source src="sad.mp3">
        </audio>
    </div>

    <div class="recording">
        <h2>When You Are Overthinking</h2>
        <audio controls>
            <source src="overthinking.mp3">
        </audio>
    </div>

    <div class="recording">
        <h2>When You Have Self-Doubt</h2>
        <audio controls>
            <source src="self_doubt.mp3">
        </audio>
    </div>

    <div class="recording">
        <h2>When You Want To Cry</h2>
        <audio controls>
            <source src="crying.mp3">
        </audio>
    </div>

    <!-- Floating Hearts -->
    <div class="hearts">
        <span>❤️</span>
        <span>💖</span>
        <span>💕</span>
        <span>💗</span>
        <span>💞</span>
    </div>

    <!-- Butterflies -->
    <img src="https://i.postimg.cc/8P2p72S2/butterfly.png" class="butterfly b1">
    <img src="https://i.postimg.cc/8P2p72S2/butterfly.png" class="butterfly b2">
    <img src="https://i.postimg.cc/8P2p72S2/butterfly.png" class="butterfly b3">

</body>
</html>
